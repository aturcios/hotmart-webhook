<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Mecánica de Motos VIP</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #111; }
      button { cursor: pointer; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 13px; }
      input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; }
      :root {
        --color-background-primary: #fff;
        --color-background-secondary: #f5f5f5;
        --color-text-primary: #111;
        --color-text-secondary: #555;
        --color-text-tertiary: #999;
        --color-border-tertiary: #e8e8e8;
        --color-border-secondary: #ccc;
        --border-radius-lg: 10px;
        --border-radius-md: 6px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
